<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Vacanze Trevi</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: url('Fontana-di-Trevi.jpg') no-repeat center center fixed;
  background-size: cover;
}

body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: inherit;
  filter: blur(2px);
  z-index: -1;
}

/* LOGO */
.logo {
  position: absolute;
  top: 20px;
  left: 20px;
  max-width: 150px;
}

/* SWITCH LINGUA */
.lang-switch {
  position: absolute;
  top: 20px;
  right: 20px;
}

.lang-switch button {
  margin-left: 5px;
  padding: 5px 10px;
  cursor: pointer;
}

/* TITOLO */
.title {
  text-align: center;
  color: white;
  font-size: 36px;
  margin-top: 80px;
  text-shadow: 2px 2px 6px black;
}

/* FOTO */
.photo-container {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 40px;
  flex-wrap: wrap;
}

.photo {
  width: 32%;
  max-width: 300px;
  text-align: center;
  cursor: pointer;
}

.photo img {
  width: 100%;
  border-radius: 12px;
}

.caption {
  color: white;
  margin-top: 5px;
  text-shadow: 1px 1px 5px black;
}

/* LIGHTBOX */
.lightbox {
  display: none;
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

.lightbox img {
  max-width: 90%;
}

.lightbox-close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 40px;
  color: white;
  cursor: pointer;
}

/* FORM */
form {
  margin-top: 50px;
  text-align: center;
}

h2, label {
  color: white;
  text-shadow: 1px 1px 5px black;
}

input, textarea {
  width: 300px;
  padding: 12px;
  margin: 10px;
}

button.submit {
  background: linear-gradient(90deg, #ff7e5f, #feb47b);
  color: white;
  border: none;
  padding: 12px 20px;
  cursor: pointer;
}

/* WHATSAPP */
.whatsapp-button {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 60px;
}

.whatsapp-button img {
  width: 100%;
}
</style>
</head>

<body>

<img src="Logo Double Ex Home.png" class="logo">

<div class="lang-switch">
  <button onclick="setLang('it')">IT</button>
  <button onclick="setLang('en')">EN</button>
</div>

<div class="title" id="title">
  Casa Vacanze Trevi - Richiedi Disponibilità
</div>

<div class="photo-container">
  <div class="photo">
    <img src="Terrazzo_1.jpg" onclick="openLightbox(this.src)">
    <div class="caption" id="cap1">Clicca per ingrandire</div>
  </div>

  <div class="photo">
    <img src="Salone_4.jpg" onclick="openLightbox(this.src)">
    <div class="caption" id="cap2">Clicca per ingrandire</div>
  </div>

  <div class="photo">
    <img src="Stanza_A_3.jpg" onclick="openLightbox(this.src)">
    <div class="caption" id="cap3">Clicca per ingrandire</div>
  </div>
</div>

<form id="bookingForm">
  <h2 id="formTitle">Richiedi Disponibilità</h2>

  <input type="text" name="nome" id="nome" placeholder="Nome" required><br>
  <input type="text" name="cognome" id="cognome" placeholder="Cognome" required><br>
  <input type="email" name="email" id="email" placeholder="Email" required><br>
  <input type="tel" name="telefono" id="telefono" placeholder="Telefono" required><br>

  <label id="arrivoLabel">Data arrivo</label><br>
  <input type="date" name="arrivo"><br>

  <label id="partenzaLabel">Data partenza</label><br>
  <input type="date" name="partenza"><br>

  <textarea name="note" id="note" placeholder="Richieste speciali"></textarea><br>

  <button type="submit" class="submit" id="submitBtn">Invia richiesta</button>
</form>

<div class="lightbox" id="lightbox">
  <span class="lightbox-close" onclick="closeLightbox()">×</span>
  <img id="lightbox-img">
</div>

<a class="whatsapp-button" href="https://wa.me/3401723563" target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/WhatsApp.svg/960px-WhatsApp.svg.png">
</a>

<script>

// LIGHTBOX
function openLightbox(src) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = src;
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}

// TRADUZIONI
function setLang(lang) {
  if(lang === "en") {
    document.getElementById("title").innerText = "Trevi Holiday Home - Check Availability";
    document.getElementById("formTitle").innerText = "Check Availability";
    document.getElementById("nome").placeholder = "First Name";
    document.getElementById("cognome").placeholder = "Last Name";
    document.getElementById("email").placeholder = "Email";
    document.getElementById("telefono").placeholder = "Phone";
    document.getElementById("arrivoLabel").innerText = "Arrival date";
    document.getElementById("partenzaLabel").innerText = "Departure date";
    document.getElementById("note").placeholder = "Special requests";
    document.getElementById("submitBtn").innerText = "Send request";

    document.getElementById("cap1").innerText = "Click to enlarge";
    document.getElementById("cap2").innerText = "Click to enlarge";
    document.getElementById("cap3").innerText = "Click to enlarge";
  }

  if(lang === "it") {
    location.reload(); // torna italiano
  }
}

// INTEGRAZIONE GOOGLE SCRIPT
const form = document.getElementById("bookingForm");
const scriptURL = "https://script.google.com/macros/s/AKfycbzA85DnaGunZV69dvIkCL2-2xlG3czAZgOCkNaV0zWiHRW_na1W68lxYt_4kbjANnoufg/exec"; // Inserisci il tuo ID Script qui

form.addEventListener("submit", e => {
  e.preventDefault();
  fetch(scriptURL, {
    method: "POST",
    body: new FormData(form)
  })
  .then(() => alert("Richiesta inviata con successo!"))
  .catch(() => alert("Errore invio"));
});

</script>

</body>
</html>
