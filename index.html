<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Vacanze Trevi</title>

<style>

/* SFONDO */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: url('Fontana-di-Trevi.jpg') no-repeat center center fixed;
  background-size: cover;
}

/* BLUR */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: inherit;
  filter: blur(2px);
  z-index: -1;
}

/* LOGO */
.logo {
  position: absolute;
  top: 20px;
  left: 20px;
  max-width: 150px;
}

/* TITOLO */
.title {
  text-align: center;
  color: white;
  font-size: 36px;
  margin-top: 80px;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
}

/* FOTO */
.photo-container {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 40px;
  flex-wrap: wrap;
}

.photo {
  width: 32%;
  max-width: 300px;
  text-align: center;
  cursor: pointer;
}

.photo img {
  width: 100%;
  border-radius: 12px;
}

.caption {
  margin-top: 5px;
  color: white;
  font-weight: bold;
  text-shadow: 1px 1px 5px black;
}

/* LIGHTBOX */
.lightbox {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

.lightbox-close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 40px;
  color: white;
  cursor: pointer;
  text-shadow: 2px 2px 6px black;
}

.lightbox-close:hover {
  transform: scale(1.2);
}

/* FORM */
form {
  margin-top: 50px;
  text-align: center;
}

form h2 {
  color: white;
  text-shadow: 1px 1px 5px black;
}

form label {
  color: white;
  text-shadow: 1px 1px 5px black;
}

input, textarea {
  width: 300px;
  padding: 12px;
  margin: 10px;
  border-radius: 6px;
  border: none;
}

button {
  padding: 12px 20px;
  background: linear-gradient(90deg, #ff7e5f, #feb47b);
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 6px;
}

/* WHATSAPP */
.whatsapp-button {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 60px;
}

.whatsapp-button img {
  width: 100%;
}

/* MOBILE */
@media(max-width: 700px) {
  .photo-container {
    flex-direction: column;
    align-items: center;
  }

  .photo {
    width: 80%;
  }
}

</style>
</head>

<body>

<!-- LOGO -->
<img src="Logo Double Ex Home.png" class="logo">

<!-- TITOLO -->
<div class="title">
  Casa Vacanze Trevi - Richiedi Disponibilità
</div>

<!-- FOTO -->
<div class="photo-container">

  <div class="photo">
    <img src="Terrazzo_1.jpg" onclick="openLightbox(this.src)">
    <div class="caption">Clicca per ingrandire</div>
  </div>

  <div class="photo">
    <img src="Salone_4.jpg" onclick="openLightbox(this.src)">
    <div class="caption">Clicca per ingrandire</div>
  </div>

  <div class="photo">
    <img src="Stanza_A_3.jpg" onclick="openLightbox(this.src)">
    <div class="caption">Clicca per ingrandire</div>
  </div>

</div>

<!-- FORM -->
<form id="bookingForm">
  <h2>Richiedi Disponibilità</h2>

  <input type="text" name="nome" placeholder="Nome" required><br>
  <input type="text" name="cognome" placeholder="Cognome" required><br>
  <input type="email" name="email" placeholder="Email" required><br>
  <input type="tel" name="telefono" placeholder="Telefono" required><br>

  <label>Data arrivo</label><br>
  <input type="date" name="arrivo"><br>

  <label>Data partenza</label><br>
  <input type="date" name="partenza"><br>

  <textarea name="note" placeholder="Richieste speciali"></textarea><br>

  <button type="submit">Invia richiesta</button>
</form>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span class="lightbox-close" onclick="closeLightbox()">×</span>
  <img id="lightbox-img">
</div>

<!-- WHATSAPP -->
<a class="whatsapp-button" href="https://wa.me/3401723563" target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/WhatsApp.svg/960px-WhatsApp.svg.png">
</a>

<script>

// LIGHTBOX
function openLightbox(src) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = src;
}

function closeLightbox() {
  document.getElementById("lightbox").style.display = "none";
}

// CHIUSURA CLICK FUORI
document.getElementById("lightbox").addEventListener("click", function(e) {
  if (e.target === this) {
    closeLightbox();
  }
});

// FORM INVIO
const form = document.getElementById("bookingForm");
const scriptURL = "https://script.google.com/macros/s/AKfycbzA85DnaGunZV69dvIkCL2-2xlG3czAZgOCkNaV0zWiHRW_na1W68lxYt_4kbjANnoufg/exec";

form.addEventListener("submit", e => {
  e.preventDefault();
  fetch(scriptURL, {
    method: "POST",
    body: new FormData(form)
  })
  .then(() => alert("Richiesta inviata con successo!"))
  .catch(() => alert("Errore invio"));
});

</script>

</body>
</html>
