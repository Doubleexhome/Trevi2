<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Vacanze Trevi</title>

<style>
  /* SFONDO CON EFFETTO BLUR */
  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: url('Fontana-di-Trevi.jpg') no-repeat center center fixed;
    background-size: cover;
  }

  /* EFFETTO BLUR SU SFONDO */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: inherit; /* usa lo stesso sfondo */
    filter: blur(2px); /* intensità del blur */
    z-index: -1;
  }

  /* LOGO AZIENDA IN ALTO A SINISTRA */
  .logo {
    position: absolute;
    top: 20px;
    left: 20px;
    max-width: 150px;
    z-index: 10;
  }

  /* TITOLO PRINCIPALE */
  .title {
    text-align: center;
    font-size: 36px;
    color: white; /* testo bianco */
    font-weight: bold;
    margin-top: 80px;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.7); /* rilievo */
  }

  /* FOTO ORIZZONTALE */
  .photo-container {
    display: flex;
    justify-content: center;
    gap: 15px; /* foto più vicine */
    margin-top: 40px;
    flex-wrap: wrap;
  }

  .photo {
    width: 32%; /* leggermente più grandi */
    max-width: 280px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .photo img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 12px;
  }

  .photo .caption {
    margin-top: 5px;
    font-size: 14px;
    color: white;
    font-weight: bold;
    text-align: center;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.7);
  }

  /* LIGHTBOX */
  .lightbox {
    position: fixed;
    display: none;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    z-index: 9999;
  }
  .lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 12px;
  }

  /* PULSANTE CHIUSURA LIGHTBOX */
  .lightbox-close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 35px;
    color: white;
    cursor: pointer;
    font-weight: bold;
    z-index: 10000;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
  }

  .lightbox-close:hover {
    transform: scale(1.2);
  }

  /* FORM */
  form {
    max-width: 900px;
    margin: 40px auto 60px auto;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  form h2 {
    margin-bottom: 20px;
    font-weight: 600;
    color: white; /* testo bianco */
    text-align: center;
    text-shadow: 1px 1px 5px rgba(0,0,0,0.7); /* rilievo */
  }

  form input,
  form textarea,
  form button {
    width: 90%;
    max-width: 500px;
    margin: 10px 0;
    padding: 15px 20px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    display: block;
  }

  form input:focus,
  form textarea:focus {
    outline: none;
    border-color: #ff7e5f;
    box-shadow: 0 0 5px #ff7e5f;
  }

  form label {
    font-weight: 500;
    color: white; /* testo bianco */
    margin-top: 10px;
    display: block;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.7); /* rilievo */
  }

  form button {
    background: linear-gradient(90deg, #ff7e5f, #feb47b);
    color: white;
    font-weight: bold;
    border: none;
    cursor: pointer;
    margin-top: 15px;
    transition: all 0.3s ease;
    text-align: center;
  }

  form button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  /* PULSANTE WHATSAPP */
  .whatsapp-button {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    z-index: 1000;
  }
  .whatsapp-button img {
    width: 100%;
    height: 100%;
  }

  @media(max-width: 600px) {
    form { margin: 20px 10px; }
    .photo-container { flex-direction: column; align-items: center; gap: 10px; }
    .photo { margin-bottom: 20px; }
    .whatsapp-button { width: 50px; height: 50px; }
  }
</style>
</head>
