<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Vacanze</title>

<style>
  /* SFONDO LANDING */
  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: url('Fontana-di-Trevi-Anita-Ekberg.jpg') no-repeat center center fixed; /* Sostituisci con il tuo sfondo */
    background-size: cover;
  }

  /* LOGO IN ALTO A SINISTRA */
  .logo {
    position: absolute;
    top: 20px;
    left: 20px;
    max-width: 150px;
    z-index: 10;
  }

  /* CONTENITORE GENERALE */
  .main-container {
    max-width: 600px;
    margin: 100px auto 60px auto;
    background: rgba(255, 255, 255, 0.85);
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* SLIDER FOTO */
  .slider-container {
    position: relative;
    width: 100%;
    /* height: 250px; */
    overflow: hidden;
  }

  .slider {
    display: flex;
    transition: transform 0.5s ease;
    width: 100%;
  }

  .slider img {
    width: 800%;
    height: 400%;
    object-fit: fill;
  }

  /* Frecce */
  .arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 30px;
    color: rgba(255,255,255,0.8);
    background: rgba(0,0,0,0.3);
    padding: 5px 10px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 5;
    user-select: none;
  }

  .arrow-left { left: 10px; }
  .arrow-right { right: 10px; }

  /* FORM */
  .form-container {
    padding: 30px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center; /* centra tutto */
    box-sizing: border-box;
  }

  .form-container h2 {
    margin-bottom: 20px;
    font-weight: 600;
    color: #333;
    text-align: center;
  }

  .form-container input,
  .form-container textarea,
  .form-container button {
    width: 110%;  /* centra i campi */
    max-width: 400px;
    margin: 10px 0;
    padding: 12px 15px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    display: block;
  }

  .form-container input:focus,
  .form-container textarea:focus {
    outline: none;
    border-color: #ff7e5f;
    box-shadow: 0 0 5px #ff7e5f;
  }

  .form-container button {
    background: linear-gradient(90deg, #ff7e5f, #feb47b);
    color: white;
    font-weight: bold;
    border: none;
    cursor: pointer;
    margin-top: 15px;
    transition: all 0.3s ease;
  }

  .form-container button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  label {
    font-weight: 500;
    color: #555;
    margin-top: 10px;
    display: block;
  }

  /* PULSANTE WHATSAPP */
  .whatsapp-button {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background-color: #25D366;
    color: white;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    z-index: 1000;
  }

  .whatsapp-button:hover {
    transform: scale(1.1);
    transition: transform 0.2s;
  }

  @media(max-width: 600px) {
    .main-container { margin: 60px 10px; }
    .arrow { font-size: 24px; padding: 5px; }
    .whatsapp-button { width: 50px; height: 50px; font-size: 26px; }
  }
</style>
</head>
<body>

<!-- LOGO -->
<img src="Logo Double Ex Home.png" class="logo" alt="Logo Società">

<div class="main-container">

  <!-- SLIDER FOTO -->
  <div class="slider-container">
    <div class="slider" id="slider">
      <img src="Salone_4.jpg" alt="Foto 1">
      <img src="Stanza_A_3.jpg" alt="Foto 2">
      <img src="Terrazzo_1.jpg" alt="Foto 3">
      <img src="Stanza_B_3.jpg" alt="Foto 4">
      <!-- Aggiungi altre foto qui -->
    </div>
    <div class="arrow arrow-left" id="prev">&#10094;</div>
    <div class="arrow arrow-right" id="next">&#10095;</div>
  </div>

  <!-- FORM -->
  <div class="form-container">
    <h2>Richiedi Disponibilità</h2>
    <form id="bookingForm">
      <input type="text" name="nome" placeholder="Nome" required>
      <input type="text" name="cognome" placeholder="Cognome" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="tel" name="telefono" placeholder="Telefono" required>
      <label>Data arrivo</label>
      <input type="date" name="arrivo" required>
      <label>Data partenza</label>
      <input type="date" name="partenza" required>
      <textarea name="note" placeholder="Richieste speciali..." rows="3"></textarea>
      <button type="submit">Invia Richiesta</button>
    </form>
  </div>

</div>

<!-- PULSANTE WHATSAPP -->
<a class="whatsapp-button" href="https://wa.me/3401723563" target="_blank" title="Scrivici su WhatsApp">📱</a>

<script>
  // FORM POST
  const form = document.getElementById("bookingForm");
  const scriptURL = "https://script.google.com/macros/s/AKfycbwVtOAHAArbc8aX9RPp7faVKUl6sYpea7Q0-yRkBN8VeJgwI9IrJMuV82qyFq6Wte6pLQ/exec"; // sostituisci con il tuo URL

  form.addEventListener("submit", e => {
    e.preventDefault();
    fetch(scriptURL, { method: "POST", body: new FormData(form) })
      .then(response => alert("Richiesta inviata con successo!"))
      .catch(error => alert("Errore nell'invio. Riprova."));
  });

  // SLIDER FOTO
  const slider = document.getElementById("slider");
  const slides = slider.children;
  let currentIndex = 0;

  function showSlide(index) {
    slider.style.transform = `translateX(${-index * 100}%)`;
  }

  document.getElementById("prev").addEventListener("click", () => {
    currentIndex = (currentIndex - 1 + slides.length) % slides.length;
    showSlide(currentIndex);
  });

  document.getElementById("next").addEventListener("click", () => {
    currentIndex = (currentIndex + 1) % slides.length;
    showSlide(currentIndex);
  });

  // TOUCH SWIPE (mobile)
  let startX = 0;
  slider.addEventListener('touchstart', e => startX = e.touches[0].clientX);
  slider.addEventListener('touchend', e => {
    let endX = e.changedTouches[0].clientX;
    if (startX - endX > 50) { // swipe left
      currentIndex = (currentIndex + 1) % slides.length;
      showSlide(currentIndex);
    } else if (endX - startX > 50) { // swipe right
      currentIndex = (currentIndex - 1 + slides.length) % slides.length;
      showSlide(currentIndex);
    }
  });
</script>

</body>
</html>
