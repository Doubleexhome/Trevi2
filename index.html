<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Vacanze</title>

<style>
  /* SFONDO LANDING */
  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: url('Fontana-di-Trevi-Anita-Ekberg.jpg') no-repeat center center fixed;
    background-size: cover;
  }

  /* LOGO IN ALTO A SINISTRA */
  .logo {
    position: absolute;
    top: 20px;
    left: 20px;
    max-width: 150px;
    z-index: 10;
  }

  /* FOTO SINGOLE */
  .photo {
    width: 90%;
    max-width: 900px;
    margin: 40px auto 0 auto;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  }

  .photo img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* CONTENITORE FORM */
  .form-container {
    max-width: 900px;         /* ora uguale alle foto */
    margin: 40px auto 60px auto;
    background: rgba(255, 255, 255, 0.85);
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    padding: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

  .form-container h2 {
    margin-bottom: 20px;
    font-weight: 600;
    color: #333;
    text-align: center;
  }

  .form-container input,
.form-container textarea,
.form-container button {
    width: 100%;        /* puoi aumentare a 95% se vuoi campi più larghi */
    max-width: 500px;  /* aumenta se vuoi che riempiano più spazio */
    margin: 10px 0;
    padding: 12px 15px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    display: block;
  }

  .form-container input:focus,
  .form-container textarea:focus {
    outline: none;
    border-color: #ff7e5f;
    box-shadow: 0 0 5px #ff7e5f;
  }

  .form-container button {
    background: linear-gradient(90deg, #ff7e5f, #feb47b);
    color: white;
    font-weight: bold;
    border: none;
    cursor: pointer;
    margin-top: 15px;
    transition: all 0.3s ease;
  }

  .form-container button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  label {
    font-weight: 500;
    color: #555;
    margin-top: 10px;
    display: block;
  }

  /* PULSANTE WHATSAPP */
  .whatsapp-button {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background-color: #25D366;
    color: white;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    z-index: 1000;
  }

  .whatsapp-button:hover {
    transform: scale(1.1);
    transition: transform 0.2s;
  }

  @media(max-width: 600px) {
    .form-container { margin: 20px 10px; }
    .photo { margin: 20px 10px 0 10px; }
    .whatsapp-button { width: 50px; height: 50px; font-size: 26px; }
  }
</style>
</head>
<body>

<!-- LOGO -->
<img src="Logo Double Ex Home.png" class="logo" alt="Logo Società">

<!-- FOTO SINGOLE -->
<div class="photo"><img src="Salone_4.jpg" alt="Foto 1"></div>
<div class="photo"><img src="Stanza_A_3.jpg" alt="Foto 2"></div>
<div class="photo"><img src="Terrazzo_1.jpg" alt="Foto 3"></div>

<!-- FORM -->
<div class="form-container">
  <h2>Richiedi Disponibilità</h2>
  <form id="bookingForm">
    <input type="text" name="nome" placeholder="Nome" required>
    <input type="text" name="cognome" placeholder="Cognome" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="tel" name="telefono" placeholder="Telefono" required>
    <label>Data arrivo</label>
    <input type="date" name="arrivo" required>
    <label>Data partenza</label>
    <input type="date" name="partenza" required>
    <textarea name="note" placeholder="Richieste speciali..." rows="3"></textarea>
    <button type="submit">Invia Richiesta</button>
  </form>
</div>

<!-- PULSANTE WHATSAPP -->
<a class="whatsapp-button" href="https://wa.me/3401723563" target="_blank" title="Scrivici su WhatsApp">📱</a>

<script>
  const form = document.getElementById("bookingForm");
  const scriptURL = "https://script.google.com/macros/s/AKfycbxK-_7VFslNEB9-5zsyas5C4aTnurD5yeUbXWhKduJmEbTlh8IR-i3KT7f1Pw8eGEtQTw/exec"; // sostituisci con il tuo URL

  form.addEventListener("submit", e => {
    e.preventDefault();
    fetch(scriptURL, { method: "POST", body: new FormData(form) })
      .then(response => alert("Richiesta inviata con successo!"))
      .catch(error => alert("Errore nell'invio. Riprova."));
  });
</script>

</body>
</html>
