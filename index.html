<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trevi Casa Vacanze</title>

<style>
  /* SFONDO LANDING */
  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: url('Fontana-di-Trevi-Anita-Ekberg.jpg') no-repeat center center fixed; /* Sostituisci con il tuo sfondo */
    background-size: cover;
  }

  /* LOGO IN ALTO A DESTRA */
  .logo {
    position: absolute;
    top: 20px;
    right: 20px;
    max-width: 150px; /* regola la dimensione del logo */
    z-index: 10;
  }

  /* SLIDER FOTO */
  .slider {
    position: relative;
    max-width: 100%;
    height: 400px;
    overflow: hidden;
    margin-top: 0px;
  }

  .slider img {
    width: 100%;
    height: 400px;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    transition: opacity 1s ease-in-out;
  }

  .slider img.active {
    opacity: 1;
  }

  /* FORM */
  .form-container {
    max-width: 500px;
    margin: 30px auto 60px auto;
    background: rgba(255, 255, 255, 0.95);
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
  }

  .form-container h2 {
    text-align: center;
    margin-bottom: 20px;
    font-weight: 600;
    color: #333;
  }

  .form-container input,
  .form-container button,
  .form-container textarea {
    width: 100%;
    padding: 12px 15px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
  }

  .form-container input:focus,
  .form-container textarea:focus {
    outline: none;
    border-color: #ff7e5f;
    box-shadow: 0 0 5px #ff7e5f;
  }

  .form-container button {
    background: linear-gradient(90deg, #ff7e5f, #feb47b);
    color: white;
    font-weight: bold;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .form-container button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  label {
    font-weight: 500;
    color: #555;
    margin-top: 10px;
    display: block;
  }

  @media(max-width: 600px) {
    .slider {
      height: 250px;
    }
    .logo {
      max-width: 120px;
    }
  }
</style>
</head>

<body>

  <!-- LOGO -->
  <img src="Logo Double Ex Home.png" class="logo" alt="Logo Società">

  <!-- SLIDER FOTO -->
  <div class="slider" id="slider">
    <img src="Salone_4.jpg" class="active" alt="Foto Casa 1">
    <img src="Stanza_A_3.jpg" alt="Foto Casa 2">
    <img src="Terrazzo_1.jpg" alt="Foto Casa 3">
    <img src="Stanza_B_3.jpg" alt="Foto Casa 3">
    <!-- Aggiungi altre foto qui -->
  </div>

  <!-- FORM -->
  <div class="form-container">
    <h2>Richiedi la disponibilità</h2>
    <form id="bookingForm">
      <input type="text" name="nome" placeholder="Nome" required>
      <input type="text" name="cognome" placeholder="Cognome" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="tel" name="telefono" placeholder="Telefono" required>
      <label>Data arrivo</label>
      <input type="date" name="arrivo" required>
      <label>Data partenza</label>
      <input type="date" name="partenza" required>
      <textarea name="note" placeholder="Richieste speciali..." rows="3"></textarea>
      <button type="submit">Invia Richiesta</button>
    </form>
  </div>

  <script>
    // FORM POST
    const form = document.getElementById("bookingForm");
    const scriptURL = "https://script.google.com/macros/s/AKfycbxLRX5Cm8OSmGg8R732qhusIKJjxneIxq6c2-tQwpeNETub595HRXuHEqCfhnEdxSv9Jw/exec"; // Inserisci qui il tuo URL

    form.addEventListener("submit", e => {
      e.preventDefault();
      fetch(scriptURL, { method: "POST", body: new FormData(form) })
        .then(response => alert("Richiesta inviata con successo!"))
        .catch(error => alert("Errore nell'invio. Riprova."));
    });

    // SLIDER FOTO AUTOMATICO
    const slides = document.querySelectorAll("#slider img");
    let current = 0;

    function showNextSlide() {
      slides[current].classList.remove("active");
      current = (current + 1) % slides.length;
      slides[current].classList.add("active");
    }

    setInterval(showNextSlide, 4000); // cambia immagine ogni 4 secondi
  </script>

</body>
</html>
