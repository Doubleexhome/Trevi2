<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Vacanze Trevi</title>

<style>
  /* SFONDO LANDING */
  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: url('Fontana-di-Trevi-Anita-Ekberg.jpg') no-repeat center center fixed;
    background-size: cover;
  }

  /* LOGO IN ALTO A SINISTRA */
  .logo {
    position: absolute;
    top: 20px;
    left: 20px;
    max-width: 150px;
    z-index: 10;
  }

  /* TITOLO PRINCIPALE */
  .title {
    text-align: center;
    font-size: 36px;
    color: white;
    font-weight: bold;
    margin-top: 80px;
    text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.7);
  }

  /* FOTO SINGOLE IN ORIZZONTALE */
  .photo-container {
    display: flex;
    justify-content: space-around;
    margin-top: 40px;
  }

  .photo {
    width: 30%;  /* ridotto il formato delle immagini */
    max-width: 280px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
  }

  .photo img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* FORM SEMPLICE, CENTRATO */
  form {
    max-width: 900px;  /* allineato alle foto */
    margin: 40px auto 60px auto;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  form h2 {
    margin-bottom: 20px;
    font-weight: 600;
    color: #333;
    text-align: center;
  }

  form input,
  form textarea,
  form button {
    width: 90%;
    max-width: 500px;
    margin: 10px 0;
    padding: 15px 20px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    display: block;
  }

  form input:focus,
  form textarea:focus {
    outline: none;
    border-color: #ff7e5f;
    box-shadow: 0 0 5px #ff7e5f;
  }

  form button {
    background: linear-gradient(90deg, #ff7e5f, #feb47b);
    color: white;
    font-weight: bold;
    border: none;
    cursor: pointer;
    margin-top: 15px;
    transition: all 0.3s ease;
    text-align: center;
  }

  form button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  label {
    font-weight: 500;
    color: #555;
    margin-top: 10px;
    display: block;
  }

  /* PULSANTE WHATSAPP */
  .whatsapp-button {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background-color: #25D366;
    color: white;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    z-index: 1000;
  }

  .whatsapp-button:hover {
    transform: scale(1.1);
    transition: transform 0.2s;
  }

  @media(max-width: 600px) {
    form { margin: 20px 10px; }
    .photo-container { flex-direction: column; align-items: center; }
    .whatsapp-button { width: 50px; height: 50px; font-size: 26px; }
  }
</style>
</head>
<body>

<!-- LOGO -->
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/WhatsApp.svg/960px-WhatsApp.svg.png" class="logo" alt="Logo WhatsApp">

<!-- TITOLO PRINCIPALE -->
<div class="title">
  Casa Vacanze Trevi - Richiedi Disponibilità
</div>

<!-- FOTO SINGOLE IN ORIZZONTALE -->
<div class="photo-container">
  <div class="photo"><img src="Salone_4.jpg" alt="Foto 1"></div>
  <div class="photo"><img src="Terrazzo_1.jpg" alt="Foto 2"></div>
  <div class="photo"><img src="Stanza_A_3.jpg" alt="Foto 3"></div>
</div>

<!-- FORM -->
<form id="bookingForm">
  <h2>Richiedi Disponibilità</h2>
  <input type="text" name="nome" placeholder="Nome" required>
  <input type="text" name="cognome" placeholder="Cognome" required>
  <input type="email" name="email" placeholder="Email" required>
  <input type="tel" name="telefono" placeholder="Telefono" required>
  <label>Data arrivo</label>
  <input type="date" name="arrivo" required>
  <label>Data partenza</label>
  <input type="date" name="partenza" required>
  <textarea name="note" placeholder="Richieste speciali..." rows="3"></textarea>
  <button type="submit">Invia Richiesta</button>
</form>

<!-- PULSANTE WHATSAPP -->
<a class="whatsapp-button" href="https://wa.me/3401723563" target="_blank" title="Scrivici su WhatsApp">📱</a>

<script>
  const form = document.getElementById("bookingForm");
  const scriptURL = "https://script.google.com/macros/s/AKfycbxK-_7VFslNEB9-5zsyas5C4aTnurD5yeUbXWhKduJmEbTlh8IR-i3KT7f1Pw8eGEtQTw/exec"; // sostituisci con il tuo URL

  form.addEventListener("submit", e => {
    e.preventDefault();
    fetch(scriptURL, { method: "POST", body: new FormData(form) })
      .then(response => alert("Richiesta inviata con successo!"))
      .catch(error => alert("Errore nell'invio. Riprova."));
  });
</script>

</body>
</html>
