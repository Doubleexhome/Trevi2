<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Vacanze Trevi</title>

<style>
  /* SFONDO LANDING */
  body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: url('Fontana-di-Trevi-Anita-Ekberg.jpg') no-repeat center center fixed;
    background-size: cover;
  }

  /* LOGO AZIENDA IN ALTO A SINISTRA */
  .logo {
    position: absolute;
    top: 20px;
    left: 20px;
    max-width: 150px;
    z-index: 10;
  }

  /* TITOLO PRINCIPALE */
  .title {
    text-align: center;
    font-size: 36px;
    color: white;
    font-weight: bold;
    margin-top: 80px;
    text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.7);
  }

  /* FOTO ORIZZONTALE CON LIGHTBOX */
  .photo-container {
    display: flex;
    justify-content: space-between;
    margin-top: 40px;
  }

  .photo {
    width: 30%;
    max-width: 280px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    cursor: pointer;
    position: relative;
  }

  .photo img {
    width: 100%;
    height: auto;
    display: block;
  }

  .photo .caption {
    position: absolute;
    bottom: 10px;
    left: 0;
    right: 0;
    padding: 5px;
    text-align: center;
    color: white;
    font-size: 14px;
    background: rgba(0,0,0,0.6);
    border-radius: 5px;
    font-weight: bold;
  }

  /* LIGHTBOX */
  .lightbox {
    position: fixed;
    display: none;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    z-index: 9999;
  }
  .lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 12px;
  }

  /* FORM SEMPLICE, CENTRATO */
  form {
    max-width: 900px;
    margin: 40px auto 60px auto;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  form h2 {
    margin-bottom: 20px;
    font-weight: 600;
    color: #ff7e5f;  /* colore coerente con il bottone */
    text-align: center;
    text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
  }

  form input,
  form textarea,
  form button {
    width: 90%;
    max-width: 500px;
    margin: 10px 0;
    padding: 15px 20px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    display: block;
  }

  form input:focus,
  form textarea:focus {
    outline: none;
    border-color: #ff7e5f;
    box-shadow: 0 0 5px #ff7e5f;
  }

  form label {
    font-weight: 500;
    color: #ff7e5f;  /* colore coerente con il bottone */
    margin-top: 10px;
    display: block;
    text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
  }

  form button {
    background: linear-gradient(90deg, #ff7e5f, #feb47b);
    color: white;
    font-weight: bold;
    border: none;
    cursor: pointer;
    margin-top: 15px;
    transition: all 0.3s ease;
    text-align: center;
  }

  form button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  /* PULSANTE WHATSAPP */
  .whatsapp-button {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    z-index: 1000;
  }
  .whatsapp-button img {
    width: 100%;
    height: 100%;
  }

  @media(max-width: 600px) {
    form { margin: 20px 10px; }
    .photo-container { flex-direction: column; align-items: center; }
    .photo { margin-bottom: 20px; }
    .whatsapp-button { width: 50px; height: 50px; }
  }
</style>
</head>
<body>

<!-- LOGO AZIENDA -->
<img src="Logo Double Ex Home.png" class="logo" alt="Logo Società">

<!-- TITOLO PRINCIPALE -->
<div class="title">Casa Vacanze Trevi - Richiedi Disponibilità</div>

<!-- FOTO ORIZZONTALE -->
<div class="photo-container">
  <div class="photo" onclick="openLightbox('Terrazzo_1.jpg')">
    <img src="Terrazzo_1.jpg" alt="Foto 1">
    <div class="caption">Clicca per ingrandire</div>
  </div>
  <div class="photo" onclick="openLightbox('Salone_4.jpg')">
    <img src="Salone_4.jpg" alt="Foto 2">
    <div class="caption">Clicca per ingrandire</div>
  </div>
  <div class="photo" onclick="openLightbox('Stanza_A_3.jpg')">
    <img src="Stanza_A_3.jpg" alt="Foto 3">
    <div class="caption">Clicca per ingrandire</div>
  </div>
</div>

<!-- FORM -->
<form id="bookingForm">
  <h2>Richiedi Disponibilità</h2>
  <input type="text" name="nome" placeholder="Nome" required>
  <input type="text" name="cognome" placeholder="Cognome" required>
  <input type="email" name="email" placeholder="Email" required>
  <input type="tel" name="telefono" placeholder="Telefono" required>
  <label>Data arrivo</label>
  <input type="date" name="arrivo" required>
  <label>Data partenza</label>
  <input type="date" name="partenza" required>
  <textarea name="note" placeholder="Richieste speciali..." rows="3"></textarea>
  <button type="submit">Invia Richiesta</button>
</form>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img src="" alt="Foto grande">
</div>

<!-- PULSANTE WHATSAPP -->
<a class="whatsapp-button" href="https://wa.me/3401723563" target="_blank" title="Scrivici su WhatsApp">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/WhatsApp.svg/960px-WhatsApp.svg.png" alt="WhatsApp">
</a>

<script>
  // FORM SUBMIT
  const form = document.getElementById("bookingForm");
  const scriptURL = "https://script.google.com/macros/s/AKfycbxK-_7VFslNEB9-5zsyas5C4aTnurD5yeUbXWhKduJmEbTlh8IR-i3KT7f1Pw8eGEtQTw/exec"; // sostituisci con il tuo URL
  form.addEventListener("submit", e => {
    e.preventDefault();
    fetch(scriptURL, { method: "POST", body: new FormData(form) })
      .then(response => alert("Richiesta inviata con successo!"))
      .catch(error => alert("Errore nell'invio. Riprova."));
  });

  // LIGHTBOX FOTO
  function openLightbox(imageSrc) {
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = lightbox.querySelector("img");
    lightboxImg.src = imageSrc;
    lightbox.style.display = "flex";
  }

  function closeLightbox() {
    const lightbox = document.getElementById("lightbox");
    lightbox.style.display = "none";
  }
</script>

</body>
</html>
